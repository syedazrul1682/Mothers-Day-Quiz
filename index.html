        <body>

        <!-- HOMEPAGE -->

        <!-- LOGIN PAGE -->
<div id="loginPage" class="homepage">

        <div id="home" class="homepage" style="display:none;">

        <div class="quiz-container">

        <button class="start-btn" onclick="startQuiz()">Start Quiz</button>

        <!-- QUIZ PAGE -->

        <div id="quiz" class="quiz-page" style="display:none;">

        <div class="quiz-header">

        <div class="quiz-title">Mother's Day Quiz 💝</div>

        <div class="option" onclick="selectOption(this,0)" id="opt0"></div>
        <div class="option" onclick="selectOption(this,1)" id="opt1"></div>

        <button onclick="nextQuestion()">Next</button>

        <script>
           
        function displayLeaderboard(data){

    let leaderboardHTML = `
    <div style="margin-top:40px;">
        <h2 style="color:#ff4d8d;">🏆 Leaderboard</h2>
        <div style="
            background:#fff;
            padding:20px;
            border-radius:12px;
            margin-top:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        ">
    `;

    data.forEach((player, index) => {

        let medal = "";
        if(index === 0) medal = "🥇";
        else if(index === 1) medal = "🥈";
        else if(index === 2) medal = "🥉";

        let highlight = "";
        if(player.name === localStorage.getItem("username")){
            highlight = "color:#ff4d8d; font-weight:bold;";
        }

        leaderboardHTML += `
            <p style="font-size:18px; ${highlight}">
                ${medal} ${index + 1}. ${player.name} — ${player.score}%
            </p>
        `;
    });

    leaderboardHTML += `</div></div>`;

    document.getElementById("quiz").innerHTML += leaderboardHTML;
}
            
            let savedName = localStorage.getItem("username");

if(savedName){
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("home").style.display = "flex";
}
            
function enterQuiz(){

  let name = document.getElementById("username").value.trim();

  if(name === ""){
    alert("Please enter your name!");
    return;
  }

  // FORCE SAVE
  localStorage.setItem("username", name);

  console.log("Saved name:", name); // DEBUG

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("home").style.display = "flex";
}
            
        function fadeReload(){
          const logo = document.querySelector(".home-logo");

          logo.classList.add("spin");

          setTimeout(() => {
            location.reload();
          }, 600); // match spin duration
        }

        function createFlowers() {
          const container = document.querySelector(".flowers");

        if (!container) return; // safety check

        const images = [
            "images/flower1.png",
            "images/flower2.png",
            "images/flower3.png"
        ];

        for (let i = 0; i < 25; i++) {
        let img = document.createElement("img");

            img.src = images[Math.floor(Math.random() * images.length)];
            img.classList.add("flower");

            img.style.left = Math.random() * 100 + "vw";
            img.style.animationDuration = (Math.random() * 6 + 4) + "s";
            img.style.animationDelay = Math.random() * 5 + "s";
            img.style.width = (20 + Math.random() * 50) + "px";

            container.appendChild(img);
          }
        }

        window.onload = function () {

        createFlowers();

        if(localStorage.getItem("quizDone") === "true"){

        let percent = localStorage.getItem("quizScore");

        let gradeText="";
        let emoji="";

        if(percent>=80){
            gradeText="Amazing Butterfly: You know it all!";
            emoji="🦋";
        }else if(percent>=50){
            gradeText="Growing Flower: You're doing great!";
            emoji="🌸";
        }else{
            gradeText="Curious Caterpillar: You’re just getting started!";
            emoji="🐛";
        }

        document.getElementById("home").style.display="none";
        document.getElementById("quiz").style.display="block";

document.getElementById("quiz").innerHTML =
"<div style='background:#FFF5E1;color:#9e0f56;border-radius:12px;padding:50px;text-align:center;'>" +

"<h1 style='font-size:36px;margin-bottom:40px;'>Results for Mother's Day Quiz</h1>" +

"<h2 style='margin:20px 0;'>Score &nbsp; " + percent + "%</h2>" +

"<h2 style='margin:20px 0;'>Grade &nbsp; " + emoji + " " + gradeText + "</h2>" +

"<br><br><button onclick='restartQuiz()'>Restart Quiz</button>" +

"<p style='margin-top:20px;'>You already completed this quiz 💗</p>" +

"</div>";
           }
        };

        function showResults(){

    let percent = Math.round((score/quiz.length)*100);
    let name = localStorage.getItem("username");

    localStorage.setItem("quizDone", "true");
    localStorage.setItem("quizScore", percent);

    let gradeText="";
    let emoji="";

    if(percent>=80){
        gradeText="Amazing Butterfly: You know it all!";
        emoji="🦋";
    }else if(percent>=50){
        gradeText="Growing Flower: You're doing great!";
        emoji="🌸";
    }else{
        gradeText="Curious Caterpillar: You’re just getting started!";
        emoji="🐛";
    }

    // show result
    document.getElementById("quiz").innerHTML =
    "<div style='background:#FFF5E1;color:#9e0f56;border-radius:12px;padding:50px;text-align:center;'>" +

    "<h1 style='font-size:36px;margin-bottom:40px;'>Results for Mother's Day Quiz</h1>" +

    "<h2 style='margin:20px 0;'>Score &nbsp; " + percent + "%</h2>" +

    "<h2 style='margin:20px 0;'>Grade &nbsp; " + emoji + " " + gradeText + "</h2>" +

    "<br><br><button onclick='restartQuiz()'>Restart Quiz</button>" +

    "</div>";

    // ✅ LOCAL leaderboard
    let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

    leaderboard.push({
        name: name,
        score: percent
    });

    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 10);

    localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

    displayLeaderboard(leaderboard);

    launchConfetti();
}

        /* GO HOME */
        function goHome(){

        document.getElementById("quiz").style.display="none";
        document.getElementById("home").style.display="flex";

        /* reset quiz */
        current=0;
        score=0;

        }    

        /** Questions **/    
        
        const quiz=[
        {
        question:"Where did Mother's Day originate?",
        options:["USA","Norway","France","Canada"],
        answer:0
        },
        {
        question:"Who helped start Mother's Day?",
        options:["Anna Jarvis","Marie Curie","Florence Nightingale","Queen Victoria"],
        answer:0
        },
        {
        question:"Which flower is commonly given on Mother's Day?",
        options:["Rose","Carnation","Tulip","Sunflower"],
        answer:1
        },
        {
        question:"Which day is Mother's Day celebrated in the US?",
        options:["First Sunday May","Second Sunday May","Third Sunday May","Fourth Sunday May"],
        answer:1
        },
        {
        question:"When is Mother's Day celebrated in Malaysia?",
        options:["First Sunday May","Second Sunday May","Third Sunday May","Fourth Sunday May"],
        answer:1
        },
        {
        question:"What is a popular Mother's Day gift?",
        options:["Flowers","Books","Shoes","Laptop"],
        answer:0
        },
        {
        question:"What do children usually say to their moms on Mother's Day?",
        options:["Good luck","Happy Mother's Day","Good night","See you"],
        answer:1
        },
        {
question:"What is the traditional symbol of Mother's Day?",
options:["Ribbon","Carnation","Heart","Star"],
answer:1
},
{
question:"Which country first officially celebrated Mother's Day?",
options:["USA","UK","Greece","China"],
answer:0
},
{
question:"What is Mother's Day mainly about?",
options:["Celebrating teachers","Honouring mothers","National holidays","Sports events"],
answer:1
}
        ];

        let current=0;
        let score=0;
        let selected=-1;

        /* START QUIZ */

        function startQuiz(){

        document.getElementById("home").style.display="none";
        document.getElementById("quiz").style.display="block";

        loadQuestion();

        }

        /* LOAD QUESTION */
        function loadQuestion(){

        // RESET COLORS EVERY QUESTION (IMPORTANT FIX)
        for(let i=0;i<4;i++){
           document.getElementById("opt"+i).style.background="";
           }

        document.getElementById("question").innerText=quiz[current].question;

        document.getElementById("progress").innerText=
        "Question "+(current+1)+" / "+quiz.length;

        let percent = (current / quiz.length) * 100;

        document.getElementById("bar").style.width = percent + "%";

        let icon = document.getElementById("progIcon");
        icon.style.left = percent + "%";

        for(let i=0;i<4;i++){

        let option = document.getElementById("opt"+i);

        option.innerText = quiz[current].options[i];
        option.classList.remove("selected");

        }

        selected=-1;

        }

        /* SELECT OPTION */

        function selectOption(element,index){

        let options=document.querySelectorAll(".option");
        options.forEach(opt=>opt.classList.remove("selected"));

        element.classList.add("selected");
        selected=index;

        // 👉 MAKE QUESTION TURN PINK
        document.getElementById("question").classList.add("question-selected");
        }

        function nextQuestion(){

        if(selected==-1){
        alert("Please select an answer first!");
        return;
        }

        if(selected==quiz[current].answer){
        score++;
        document.getElementById("opt"+selected).style.background="#4CAF50";
        }else{
        document.getElementById("opt"+selected).style.background="#e74c3c";
        document.getElementById("opt"+quiz[current].answer).style.background="#4CAF50";
        }

        setTimeout(()=>{

        current++;

        if(current >= quiz.length){
        showResults();
        return;
        }

        document.getElementById("question").classList.remove("question-selected");

        loadQuestion();

        },1000);

        }

        /* RESTART */

function restartQuiz(){
  localStorage.removeItem("quizDone");
  localStorage.removeItem("quizScore");
  location.reload();
}

        /* CONFETTI */

        function launchConfetti(){

        var duration=3*1000;
        var end=Date.now()+duration;

        (function frame(){

        confetti({
        particleCount:5,
        angle:60,
        spread:55,
        origin:{x:0}
        });

        confetti({
        particleCount:5,
        angle:120,
        spread:55,
        origin:{x:1}
        });

        if(Date.now()<end){
        requestAnimationFrame(frame);
        }

        }());

        }

        </script>
